{% extends "home/base.html" %}

{% block title %}Log In - Bookish Brio{% endblock %}

{% block extra_css %}
<style>
    .auth-title {
        font-size: 1.8rem;
        font-weight: 800;
        margin-bottom: 8px;
        text-align: center;
        letter-spacing: -0.5px;
    }

    .auth-subtitle {
        text-align: center;
        color: var(--text-meta);
        font-size: 0.9rem;
        margin-bottom: 32px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        font-size: 0.85rem;
        font-weight: 700;
        margin-bottom: 8px;
        color: var(--text-main);
    }

    .form-control {
        width: 100%;
        padding: 12px 16px;
        border: 1.5px solid var(--border);
        border-radius: 12px;
        background: hsl(210, 15%, 98%);
        font-size: 0.95rem;
        transition: var(--transition);
        font-family: inherit;
    }

    .form-control:focus {
        border-color: var(--primary);
        background: #fff;
        outline: none;
        box-shadow: 0 0 0 4px hsla(16, 100%, 50%, 0.1);
    }

    .auth-footer {
        margin-top: 32px;
        text-align: center;
        font-size: 0.9rem;
        color: var(--text-meta);
        padding-top: 24px;
        border-top: 1px solid var(--border);
    }

    .auth-footer a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 700;
    }

    .auth-footer a:hover {
        text-decoration: underline;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2 class="auth-title">Welcome Back</h2>
        <p class="auth-subtitle">Log in to your account</p>

        <form method="post" id="loginForm">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Enter your username"
                    required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control"
                    placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn-orange"
                style="width: 100%; height: 48px; margin-top: 12px; font-size: 1rem;" id="submitBtn">
                Log In
            </button>
        </form>

        <div class="auth-footer">
            <p>New to Bookish Brio? <a href="{% url 'signup' %}">Sign Up</a></p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.getElementById('loginForm').addEventListener('submit', function () {
        const btn = document.getElementById('submitBtn');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right: 8px;"></i> Logging in...';
        btn.style.opacity = '0.8';
        btn.disabled = true;
    });
</script>
{% endblock %}
